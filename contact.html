<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — heybharat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="contact">

  <div data-mount="grid"></div>
  <div data-mount="nav"></div>

  <section class="page-head">
    <div class="shell">
      <h1 class="page-head__title page-head__title--with-loop reveal-blur">
        <span class="title-word">get in</span>
        <!-- ╔═══════════════════════════════════════════════════════════╗
             ║   INLINE TITLE SLIDESHOW — sits between "get in" and "touch"
             ║   Crossfades through your project covers on a 7-second loop.
             ║
             ║   ADDING MORE IMAGES:
             ║   1. Add an <img> tag inside .title-loop below.
             ║   2. Set animation-delay so each image is evenly offset.
             ║      Formula: delay = -(N × loopDuration / totalImages)
             ║      where N is the image's index (0-based).
             ║      Current: 2 images on a 7s loop → 0s and -3.5s.
             ║      For 4 images: 0s, -1.75s, -3.5s, -5.25s.
             ║
             ║   Recommended: 16:9 images (1600×900) of your work covers.
             ║   The frame is 16:9 to match project cover image ratios.
             ╚═══════════════════════════════════════════════════════════╝ -->
        <span class="title-loop" aria-hidden="true">
          <img src="firstandlast-cover.jpg" alt="" class="title-loop__img" style="animation-delay: 0s;" />
          <img src="takeoff-cover.jpg" alt="" class="title-loop__img" style="animation-delay: -3.5s;" />
        </span>
        <span class="title-word">touch</span>
      </h1>
      <p class="page-head__sub reveal">let's collaborate. drop me a line about your project or reach out on social — i read every message</p>
    </div>
  </section>

  <section class="section" style="padding-top:0;">
    <div class="shell">
      <div class="contact-grid">
        <form class="contact-form reveal" onsubmit="event.preventDefault(); const b=this.querySelector('.submit-btn'); b.textContent='Sent ✓'; setTimeout(()=>{this.reset();b.textContent='Submit'},1500);">
          <div class="contact-form__field">
            <label for="name">Name</label>
            <input id="name" type="text" required placeholder="Your name" />
          </div>
          <div class="contact-form__field">
            <label for="email">Email</label>
            <input id="email" type="email" required placeholder="hello@you.com" />
          </div>
          <div class="contact-form__field">
            <label for="msg">Message</label>
            <textarea id="msg" required placeholder="Tell me about your project…"></textarea>
          </div>
          <button type="submit" class="submit-btn">Submit</button>
        </form>

        <div class="socials reveal-stagger">
          <a href="mailto:work@heybharat.design" class="social-row">
            <span class="social-row__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
            </span>
            <div>
              <div class="social-row__name">email</div>
              <span class="social-row__handle">work@heybharat.design</span>
            </div>
          </a>
          <a href="https://dribbble.com/bharatarora27" target="_blank" rel="noopener" class="social-row">
            <span class="social-row__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><path d="M8 3.5c3 3 5 7 6 13M3.5 9c5-1 11 0 16.5 3M3 14c4 1 11 1 18-3"/></svg>
            </span>
            <div>
              <div class="social-row__name">dribbble</div>
              <span class="social-row__handle">@bharatarora27</span>
            </div>
          </a>
          <a href="https://instagram.com" target="_blank" rel="noopener" class="social-row">
            <span class="social-row__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>
            </span>
            <div>
              <div class="social-row__name">instagram</div>
              <span class="social-row__handle">@bharat</span>
            </div>
          </a>
        </div>
      </div>
    </div>
  </section>

  <div data-mount="footer"></div>

  <script src="layout.js"></script>
  <script src="main.js"></script>
</body>
</html>
